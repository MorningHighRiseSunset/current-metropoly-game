<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metropoly - Online Multiplayer</title>
    <link rel="stylesheet" href="/game.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fflate@0.8.0/umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>
    <script src="/dice-glb-config.js"></script>
</head>
<body>
    <div class="game-container">
        <!-- Header with game info -->
        <header class="game-header">
            <div class="game-title">
                <h1>🏛️ METROPOLY</h1>
                <div class="game-id">Game: <span id="gameCode">LOADING...</span></div>
            </div>
            <div class="player-info">
                <div class="player-name" id="playerName">Player</div>
            </div>
        </header>
        
        <!-- Settings Button -->
        <button id="settingsBtn" class="settings-btn" title="Settings">⚙️</button>
        
        <!-- Settings Modal -->
        <div id="settingsModal" class="modal hidden">
            <div class="modal-content">
                <span class="modal-close">&times;</span>
                <h2>Settings</h2>
                <div class="settings-section">
                    <h3>Theme</h3>
                    <button id="themeToggle" class="theme-toggle-btn">🌙 Dark Mode</button>
                </div>
            </div>
        </div>

        <!-- Main game area -->
        <main class="game-main">
            <!-- Left sidebar - Players list -->
            <aside class="sidebar players-sidebar">
                <h3 class="sidebar-panel-title">Players</h3>
                <div id="playersList" class="players-list panel-scroll"></div>
            </aside>

            <!-- Center - Game Board -->
            <section class="game-board-section">
                <div class="board-container">
                    <div id="gameBoard" class="game-board"></div>
                    <div id="tokens" class="tokens-layer"></div>
                    <div id="token3DScene" class="token-3d-scene"></div>
                    <div id="dice3DContainer" class="dice-3d-container"></div>
                </div>
            </section>

            <!-- Right sidebar -->
            <aside class="sidebar right-sidebar">
                <div class="sidebar-panel sidebar-panel--properties">
                    <h3 class="sidebar-panel-title">My Properties</h3>
                    <div id="myProperties" class="properties-list panel-scroll"></div>
                </div>

                <div class="sidebar-panel sidebar-panel--chat">
                    <h3 class="sidebar-panel-title">Chat</h3>
                    <div id="chatMessages" class="chat-messages panel-scroll"></div>
                    <div class="chat-compose">
                        <input type="text" id="chatInput" placeholder="Message..." maxlength="100">
                        <button id="sendChatBtn" class="btn btn-small btn-send">Send</button>
                    </div>
                </div>

                <div class="sidebar-panel sidebar-panel--log">
                    <h3 class="sidebar-panel-title">Game Log</h3>
                    <div id="gameLog" class="game-log-messages panel-scroll">
                        <div class="log-entry">Welcome to Metropoly!</div>
                        <div class="log-entry">Waiting for players...</div>
                    </div>
                </div>

                <div class="sidebar-panel sidebar-panel--actions">
                    <div class="actions-balance">
                        <span class="actions-balance-label">Balance</span>
                        <span class="actions-balance-value" id="playerMoney">$1500</span>
                    </div>
                    <button id="payJailBtn" class="btn btn-warning btn-block" style="display: none;">Pay $50 — Leave Jail</button>
                    <button id="rollDiceBtn" class="btn btn-primary btn-roll btn-block">Roll Dice</button>
                    <button id="endTurnBtn" class="btn btn-secondary btn-block" disabled>End Turn</button>
                </div>
            </aside>
        </main>
    </div>

    <!-- Modals -->
    <div id="propertyModal" class="modal hidden">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <h3 id="propertyTitle">Property</h3>
            <div id="propertyContent"></div>
        </div>
    </div>

    <div id="buyModal" class="modal hidden">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <h3>Buy Property</h3>
            <div id="buyContent"></div>
            <div class="modal-actions">
                <button id="confirmBuyBtn" class="btn btn-success">Buy</button>
                <button id="cancelBuyBtn" class="btn btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <div id="tradeModal" class="modal hidden">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <h3>Trade</h3>
            <div id="tradeContent"></div>
        </div>
    </div>

    <div id="tokenModal" class="modal hidden">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <h3>Choose Your Token</h3>
            <div id="tokenSelection" class="token-selection">
                <div class="tokens-grid">
                    <div class="token-option" data-token="0">
                        <div class="token-image">
                            <img src="/images/burger%20image.png" alt="Burger">
                        </div>
                        <div class="token-name">Burger</div>
                    </div>
                    <div class="token-option" data-token="1">
                        <div class="token-image">
                            <img src="/images/rolls%20royce%20image.png" alt="Rolls Royce">
                        </div>
                        <div class="token-name">Rolls Royce</div>
                    </div>
                    <div class="token-option" data-token="2">
                        <div class="token-image">
                            <img src="/images/top%20hat%20image.png" alt="Top Hat">
                        </div>
                        <div class="token-name">Top Hat</div>
                    </div>
                    <div class="token-option" data-token="3">
                        <div class="token-image">
                            <img src="/images/woman%20model%20image.png" alt="Vegas Model">
                        </div>
                        <div class="token-name">Vegas Model</div>
                    </div>
                </div>
                <div class="modal-actions">
                    <button id="confirmTokenBtn" class="btn btn-primary" disabled>Select Token</button>
                </div>
            </div>
        </div>
    </div>

    <div id="cardModal" class="modal hidden">
        <div class="modal-content">
            <h3 id="cardTitle">Card</h3>
            <div id="cardContent"></div>
            <div class="modal-actions">
                <button id="cardOkBtn" class="btn btn-primary">OK</button>
            </div>
        </div>
    </div>

    <div id="gameOverModal" class="modal hidden">
        <div class="modal-content">
            <h2 id="gameOverTitle">Game Over</h2>
            <div id="gameOverContent"></div>
            <button onclick="location.reload()" class="btn btn-primary">New Game</button>
        </div>
    </div>

    <script src="runtime-config.js"></script>
    <script src="/game.js"></script>
</body>
</html>
